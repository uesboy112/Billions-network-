<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Billions Allocation Checker</title>

                <style>
                        body {
                                    font-family: Arial, sans-serif;
                                                text-align: center;
                                                            background-color: #0f172a;
                                                                        color: white;
                                                                                    padding: 50px;
                                                                                            }

                                                                                                    h1 {
                                                                                                                color: #38bdf8;
                                                                                                                        }

                                                                                                                                input {
                                                                                                                                            padding: 10px;
                                                                                                                                                        width: 250px;
                                                                                                                                                                    border-radius: 5px;
                                                                                                                                                                                border: none;
                                                                                                                                                                                            margin-top: 10px;
                                                                                                                                                                                                    }

                                                                                                                                                                                                            button {
                                                                                                                                                                                                                        padding: 10px 20px;
                                                                                                                                                                                                                                    margin-top: 15px;
                                                                                                                                                                                                                                                border: none;
                                                                                                                                                                                                                                                            border-radius: 5px;
                                                                                                                                                                                                                                                                        background-color: #38bdf8;
                                                                                                                                                                                                                                                                                    color: black;
                                                                                                                                                                                                                                                                                                cursor: pointer;
                                                                                                                                                                                                                                                                                                            font-weight: bold;
                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                            button:hover {
                                                                                                                                                                                                                                                                                                                                        background-color: #0ea5e9;
                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                        #result {
                                                                                                                                                                                                                                                                                                                                                                    margin-top: 20px;
                                                                                                                                                                                                                                                                                                                                                                                font-size: 20px;
                                                                                                                                                                                                                                                                                                                                                                                            color: #22c55e;
                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                        </style>
                                                                                                                                                                                                                                                                                                                                                                                                        </head>
                                                                                                                                                                                                                                                                                                                                                                                                        <body>

                                                                                                                                                                                                                                                                                                                                                                                                            <h1>💰 Billions Allocation Checker</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                <p>Enter your email to check your allocation</p>

                                                                                                                                                                                                                                                                                                                                                                                                                    <input type="email" id="email" placeholder="Enter your email" required>
                                                                                                                                                                                                                                                                                                                                                                                                                        <br>
                                                                                                                                                                                                                                                                                                                                                                                                                            <button onclick="checkAllocation()">Check Allocation</button>

                                                                                                                                                                                                                                                                                                                                                                                                                                <p id="result"></p>

                                                                                                                                                                                                                                                                                                                                                                                                                                    <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                            function checkAllocation() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                        const email = document.getElementById("email").value;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (email === "") {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    alert("Please enter your email!");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Generate random number between 3000 and 50000
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const allocation = Math.floor(Math.random() * (50000 - 3000 + 1)) + 3000;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById("result").innerText =
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    "🎉 Congratulations! Your allocation is $" + allocation.toLocaleString();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </html>
